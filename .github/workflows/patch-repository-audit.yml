name: Patch repository audit

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Verify patch-only release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reject source trees and verify release artifacts
        shell: pwsh
        run: ./scripts/Test-PatchRepository.ps1
